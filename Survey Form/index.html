<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Survey Form</title>
</head>
<body>
    <header>
        <h1>SIMPLE SURVEY FORM</h1>
    </header>
    <!-- form section -->
    <form>
    <div class="info">
        <label for="name">Name</label>
    <input type="text" id="name" placeholder="Enter your name">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter your email">
    <label for="age">Age</label>
    <input type="number" id="age" placeholder="Enter your age">
    </div>
    <div class="role">
        <label for="role">Which option best describes you?</label>
    <select name="role" id="role">
        <option value="choose">Choose your role</option>
        <option value="student">Student</option>
        <option value="intern">Intern</option>
        <option value="professional">Professional</option>
        <option value="other">Other</option>
    </select>
    </div>
    <div class="recommendation">
        <label for="recommendation">
        <p>Would you recommend GeeksforGeeks to a friend?</p>
    </label>
    <label for="recommend-1">
        <input type="radio" name="recommend" id="recommend-1">
        Yes
    </label>
    <label for="recommend-2">
        <input type="radio" name="recommend" id="recommend-2">
        No
    </label>
    <label for="recommend-3">
        <input type="radio" name="recommend" id="recommend-3">
        Maybe
    </label>
    </div>
    <div class="lang">
        <label for="languages">
            <p>Languages and Frameworks known <small>(Check all that apply)</small></p>
        </label>
        <label for="C"><input type="checkbox" name="C" id="C">C</label>
        <label for="C++"><input type="checkbox" name="C++" id="C++">C++</label>
        <label for="C#"><input type="checkbox" name="C#" id="C#">C#</label>
        <label for="Java"><input type="checkbox" name="Java" id="Java">Java</label>
        <label for="Python"><input type="checkbox" name="Python" id="Python">Python</label>
        <label for="JavaScript"><input type="checkbox" name="JavaScript" id="JavaScript">JavaScript</label>
        <label for="React"><input type="checkbox" name="React" id="React">React</label>
        <label for="Angular"><input type="checkbox" name="Angular" id="Angular">Angular</label>
        <label for="Django"><input type="checkbox" name="Django" id="Django">Django</label>
        <label for="Spring"><input type="checkbox" name="Spring" id="Spring">Spring</label>
    </div>
    <div class="suggestions">
        <p>Any comments ot suggestions</p>
        <textarea name="suggestions" id="suggestions" placeholder="Enter your comment here"></textarea>
    </div>
    </form>
    <!-- submission section -->
    <div class="submit">
        <button id="submit" type="submit" onclick="location.reload();"><strong>Submit</strong></button>
    </div>
</body>
</html>
